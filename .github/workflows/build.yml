name: Java CI with Gradle

on:
  push:
    branches: [ "main" ] # Сработает, когда ты закинешь код в ветку main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Билдим на быстром Linux-сервере

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      run: chmod +x gradlew && ./gradlew build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Minecraft-Mod-Jar
        path: build/libs/*.jar # Сохраняем готовый .jar файл
